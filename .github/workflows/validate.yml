name: Validate study app

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run static validation
        id: validation
        shell: bash
        run: |
          set +e
          node scripts/validate.mjs > validation.log 2>&1
          code=$?
          cat validation.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation.log
          retention-days: 7
      - name: Enforce validation result
        if: always()
        run: exit ${{ steps.validation.outputs.exit_code }}
