name: Validate study app

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run static validation
        run: |
          set +e
          node scripts/validate.mjs 2>&1 | tee validation-report.txt
          status=${PIPESTATUS[0]}
          exit $status
      - name: Upload validation report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.txt
          retention-days: 7
