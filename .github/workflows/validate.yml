name: Diagnose UI refactor patch

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'refactor/ui-foundation'
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ui-foundation
          fetch-depth: 0
      - name: Inspect remaining staged patch
        run: |
          set +e
          base64 --decode scripts/ui-refactor-no-workflow.patch.gz.b64 | gzip -d > ui-refactor.patch
          git apply --numstat ui-refactor.patch > patch-files.txt 2>&1
          excludes=(
            --exclude=boards.html
            --exclude=boards-maintenance.js
            --exclude=scripts/validate.mjs
            --exclude=styles/feature-panels.css
            --exclude=ui/panel-templates.js
          )
          git apply --check --verbose "${excludes[@]}" ui-refactor.patch > apply-check.txt 2>&1
          echo $? > apply-status.txt
          exit 0
      - name: Upload patch diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ui-refactor-patch-diagnostics
          path: |
            patch-files.txt
            apply-check.txt
            apply-status.txt
          retention-days: 2
