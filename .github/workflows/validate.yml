name: Validate study app

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run static validation
        run: |
          set +e
          node scripts/validate.mjs 2>&1 | tee validation-report.txt
          status=${PIPESTATUS[0]}
          exit $status
      - name: Install browser smoke-test harness
        run: npm install --no-save --no-package-lock puppeteer-core@24.16.0
      - name: Run desktop and mobile browser smoke tests
        run: node scripts/browser-smoke.mjs
      - name: Upload browser smoke results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ui-browser-smoke-results
          path: |
            ui-smoke-report.json
            ui-smoke-desktop.png
            ui-smoke-mobile.png
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload validation report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.txt
          retention-days: 7
