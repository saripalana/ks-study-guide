name: Validate study app

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run full platform static validation
        run: |
          set +e
          node scripts/validate-full-platform.mjs 2>&1 | tee validation-report.txt
          status=${PIPESTATUS[0]}
          exit $status
      - name: Validate ABPN site and question-bank identity separation
        run: node scripts/validate-site-identity.mjs
      - name: Validate one-button Device Sync safeguards
        run: node scripts/validate-device-sync.mjs
      - name: Validate question-bank isolation and runtime safeguards
        run: node scripts/validate-question-banks.mjs
      - name: Validate visible Question Vault bank routing
        run: node scripts/vault-bank-scope-smoke.mjs
      - name: Validate active-bank reset transaction identity
        run: node scripts/validate-reset-transaction.mjs
      - name: Install browser smoke-test harness
        run: npm install --no-save --no-package-lock puppeteer-core@24.16.0
      - name: Run desktop and mobile browser smoke tests
        run: node scripts/browser-smoke-runner.mjs
      - name: Run focused Device Sync browser smoke test
        run: node scripts/device-sync-smoke.mjs
      - name: Run end-to-end practice exam smoke test
        run: node scripts/exam-smoke.mjs
      - name: Run expandable question-bank and second-bank exam test
        run: node scripts/question-bank-selector-smoke.mjs
      - name: Run complete K&S and future-bank consistency matrix
        run: node scripts/full-platform-consistency-smoke.mjs
      - name: Run three-bank import readiness test
        run: node scripts/qbank-import-readiness-smoke.mjs
      - name: Upload browser smoke results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ui-browser-smoke-results
          path: |
            ui-smoke-report.json
            ui-smoke-desktop.png
            ui-smoke-mobile.png
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload Device Sync smoke results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: device-sync-smoke-results
          path: |
            device-sync-smoke-report.json
            device-sync-smoke.png
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload exam-flow smoke results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: exam-flow-smoke-results
          path: |
            exam-smoke-report.json
            exam-smoke-dashboard.png
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload question-bank selector results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: question-bank-selector-results
          path: |
            question-bank-selector-report.json
            question-bank-selector-ks.png
            question-bank-selector-future.png
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload full platform consistency results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: full-platform-consistency-results
          path: |
            full-platform-consistency-report.json
            full-platform-ks.png
            full-platform-future.png
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload question-bank import readiness results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: qbank-import-readiness-results
          path: |
            qbank-import-readiness-report.json
            qbank-import-readiness.png
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload validation report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.txt
          retention-days: 7