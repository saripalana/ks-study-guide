name: Migrate timestamp-aware device sync branch

on:
  push:
    branches: [feature/device-sync-timestamps]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/device-sync-timestamps
          fetch-depth: 0
      - name: Check whether migration is pending
        id: pending
        run: |
          if [ -f scripts/apply-device-sync-timestamps.mjs ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply reviewed patch
        if: steps.pending.outputs.needed == 'true'
        run: node scripts/apply-device-sync-timestamps.mjs
      - name: Remove feature-branch migration files
        if: steps.pending.outputs.needed == 'true'
        run: git rm scripts/apply-device-sync-timestamps.mjs .github/workflows/apply-device-sync-timestamps.yml
      - name: Commit patched feature branch
        if: steps.pending.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add boards-drive-backup.js boards.html scripts/validate.mjs
          git commit -m "Add timestamp-aware cross-device conflict choices"
          git push origin HEAD:feature/device-sync-timestamps
