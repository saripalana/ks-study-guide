name: Apply UI panel refactor

on:
  push:
    branches: [refactor/ui-foundation]

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ui-foundation
          fetch-depth: 0
      - name: Apply presentation separation migration
        run: node scripts/apply-ui-panel-refactor.mjs
      - name: Validate migrated application
        run: node scripts/validate.mjs
      - name: Remove one-time migration machinery
        run: rm scripts/apply-ui-panel-refactor.mjs .github/workflows/apply-ui-panel-refactor.yml
      - name: Commit migrated modules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete shared panel presentation refactor"
          git push origin HEAD:refactor/ui-foundation
