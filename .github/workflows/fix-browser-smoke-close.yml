name: Fix browser smoke close interaction

on:
  push:
    branches: [refactor/ui-foundation]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ui-foundation
          fetch-depth: 0
      - name: Apply close-button harness correction
        run: node scripts/fix-browser-smoke-close.mjs
      - name: Remove one-time patch files
        run: rm scripts/fix-browser-smoke-close.mjs .github/workflows/fix-browser-smoke-close.yml
      - name: Commit corrected smoke harness
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix saved-test review close interaction in browser smoke test"
          git push origin HEAD:refactor/ui-foundation
