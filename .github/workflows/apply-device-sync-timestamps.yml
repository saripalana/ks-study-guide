name: Apply device sync timestamp patch

# Temporary branch-only migration. The trusted main workflow applies and removes this file.
on:
  push:
    branches: [feature/device-sync-timestamps]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feature/device-sync-timestamps
          fetch-depth: 0
      - name: Apply controlled patch
        run: node scripts/apply-device-sync-timestamps.mjs
      - name: Remove temporary patch machinery
        run: git rm scripts/apply-device-sync-timestamps.mjs .github/workflows/apply-device-sync-timestamps.yml
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add boards-drive-backup.js boards.html scripts/validate.mjs
          git commit -m "Add timestamp-aware cross-device conflict choices"
          git push origin HEAD:feature/device-sync-timestamps
